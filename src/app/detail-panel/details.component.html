<div class="detail-panel" *ngIf="event">

  <div class="detail-close">
    <button mat-stroked-button color="primary">← Back</button>
  </div>

  <h2>{{event.job_title || 'Job Details'}}</h2>

  <div class="detail-row">
    <div class="detail-field">
      <span class="detail-label">Location</span>
      <span class="detail-value">{{event.location || '—'}}</span>
    </div>
    <div class="detail-field">
      <span class="detail-label">Salary</span>
      <span class="detail-value">{{event.salary || '—'}}</span>
    </div>
    <div class="detail-field">
      <span class="detail-label">Type</span>
      <span class="detail-value">{{event.type || '—'}}</span>
    </div>
    <div class="detail-field">
      <span class="detail-label">Category</span>
      <span class="detail-value">{{event.category || '—'}}</span>
    </div>
    <div class="detail-field">
      <span class="detail-label">Posted</span>
      <span class="detail-value">{{event.date || '—'}}</span>
    </div>
  </div>

</div>
